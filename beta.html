    <script>

        var show = function(a){

            var classes = $(a.parentElement).attr('class');
            var color = ""
            if (classes.includes("a1")){
                color = "rgb(68, 34, 136)"
            }
            if (classes.includes("a2")){
                color = "rgb(108, 162, 234)"
            }
            if (classes.includes("a3")){
                color = "rgb(181, 211, 61)"
            }
            if (classes.includes("a4")){
                color = "rgb(254, 210, 63)"
            }
            if (classes.includes("a5")){
                color = "rgb(235, 125, 91)"
            }

            console.log($(a).css("background-color"));
            console.log($(a).css("background-color").toString());


            if ($(a).css("background-color").toString() == "rgb(255, 255, 255)"){
                $(a).css("background-color", color)
                return

            }


            if ($(a).css("background-color").toString() == color){
                $(a).css("background-color", "white")

            }

        }


        var imgr = function(input){

            $(input).hide();

            console.log(input.parentElement)
            var b = input.parentElement.children[1];
            if (input.files && input.files[0]) {
            var reader = new FileReader();

            reader.onload = function (e) {
                $(b)
                    .attr('src', e.target.result)
            };

            reader.readAsDataURL(input.files[0]);
        }

        }
    </script>
